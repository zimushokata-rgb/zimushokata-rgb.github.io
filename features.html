<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代表紹介 | かたひら税理士事務所</title>
<meta name="description" content="かたひら税理士事務所 代表税理士 片平修造のご紹介。中小企業の経営者様に寄り添い、税務・会計業務を全面的にサポートいたします。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================
   CSS Variables & Reset
   ============================ */
:root {
  --primary: #1b5e3b;
  --primary-light: #2e7d52;
  --accent: #c8a633;
  --accent-light: #d4ba4f;
  --accent-dark: #a88a2a;
  --gold: #b8963e;
  --gold-light: #d4b76a;
  --white: #ffffff;
  --off-white: #f5f8f5;
  --light-bg: #eef3ee;
  --gray: #888888;
  --dark-gray: #333333;
  --text: #2c2c2c;
  --text-light: #666666;
  --border: #d5e0d5;
  --shadow: rgba(27, 94, 59, 0.08);
  --font-sans: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
  --font-serif: 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-sans);
  color: var(--text);
  line-height: 1.8;
  background: var(--white);
  overflow-x: hidden;
}

img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; transition: var(--transition); }
ul { list-style: none; }

/* ============================
   Navigation
   ============================ */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid transparent;
  transition: var(--transition);
}

.nav.scrolled {
  border-bottom-color: var(--border);
  box-shadow: 0 2px 20px var(--shadow);
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 80px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}


.nav-logo-text {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.1em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.nav-links a {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.05em;
  position: relative;
  padding-bottom: 4px;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: var(--transition);
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-contact-btn {
  background: var(--primary);
  color: var(--white) !important;
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 0.8rem !important;
  letter-spacing: 0.1em;
}

.nav-contact-btn::after { display: none !important; }

.nav-contact-btn:hover {
  background: var(--primary-light);
  transform: translateY(-1px);
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  z-index: 1001;
  background: none;
  border: none;
}

.hamburger span {
  width: 28px;
  height: 2px;
  background: var(--primary);
  transition: var(--transition);
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 6px);
}
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -6px);
}

/* ============================
   Page Hero
   ============================ */
.page-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #0f3d24 60%, #0a2e1a 100%);
  padding: 140px 2rem 60px;
}
.page-hero .section-label { color: var(--gold); }
.page-hero .section-title { color: #fff !important; }

/* ============================
   Section Common
   ============================ */
.section {
  padding: 100px 2rem;
}

.section-header {
  text-align: center;
  margin-bottom: 4rem;
}

.section-label {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.section-title {
  font-family: var(--font-serif);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}

.section-line {
  width: 60px;
  height: 2px;
  background: var(--accent);
  margin: 1.5rem auto 0;
}

.section-desc {
  color: var(--text-light);
  font-size: 0.95rem;
  max-width: 640px;
  margin: 1.5rem auto 0;
  line-height: 2;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* ============================
   About (代表紹介)
   ============================ */
.about {
  background: var(--off-white);
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 4rem;
  align-items: center;
}

.about-photo {
  position: relative;
}

.about-photo-main {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(27,94,59,0.12);
}

.about-photo-main img {
  width: 100%;
  aspect-ratio: 4/5;
  object-fit: cover;
  object-position: top center;
}

.about-photo-accent {
  position: absolute;
  bottom: -20px;
  left: -20px;
  width: 160px;
  height: 160px;
  background: var(--accent);
  opacity: 0.1;
  border-radius: 50%;
  z-index: -1;
}

.about-label {
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.2em;
  font-weight: 500;
  margin-bottom: 0.5rem;
}

.about-name-en {
  font-size: 0.85rem;
  color: var(--gray);
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.about-name {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}

.about-title-role {
  font-size: 0.9rem;
  color: var(--text-light);
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.about-text {
  color: var(--text);
  font-size: 0.95rem;
  line-height: 2.2;
  margin-bottom: 1.5rem;
}

.about-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-top: 2rem;
}

.about-info-item {
  background: var(--white);
  padding: 1.2rem;
  border-radius: 10px;
}

.about-info-label {
  font-size: 0.7rem;
  color: var(--gray);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.about-info-value {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--primary);
}

/* ============================
   CTA
   ============================ */
.cta {
  background: linear-gradient(135deg, var(--primary) 0%, #0a2e1a 100%);
  padding: 80px 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.cta::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(200,166,51,0.1), transparent 70%);
}

.cta-title {
  font-family: var(--font-serif);
  font-size: 2rem;
  color: var(--white);
  margin-bottom: 1rem;
  letter-spacing: 0.05em;
  position: relative;
}

.cta-text {
  color: rgba(255,255,255,0.7);
  font-size: 0.95rem;
  margin-bottom: 2rem;
  line-height: 2;
  position: relative;
}

.cta-buttons {
  display: flex;
  justify-content: center;
  gap: 1.5rem;
  flex-wrap: wrap;
  position: relative;
}

.cta-phone {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--accent);
  color: var(--white);
  padding: 18px 40px;
  border-radius: 50px;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: var(--transition);
}

.cta-phone:hover {
  background: var(--accent-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(200,166,51,0.3);
}

.cta-mail {
  display: flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--white);
  padding: 18px 40px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 0.95rem;
  font-weight: 500;
  transition: var(--transition);
}

.cta-mail:hover {
  border-color: var(--white);
  background: rgba(255,255,255,0.05);
}

/* ============================
   Footer
   ============================ */
.footer {
  background: #0a1f12;
  padding: 60px 2rem 30px;
}

.footer-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.footer-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 30px;
}

.footer-logo-text {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  color: var(--white);
  letter-spacing: 0.1em;
  margin-bottom: 1rem;
}

.footer-address {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
  line-height: 1.8;
}

.footer-links {
  display: flex;
  gap: 2rem;
}

.footer-links a {
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  transition: var(--transition);
}

.footer-links a:hover {
  color: var(--white);
}

.footer-bottom {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.05em;
}

/* ============================
   Scroll Animations
   ============================ */
.fade-in {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

.fade-in-left {
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-in-left.visible {
  opacity: 1;
  transform: translateX(0);
}

.fade-in-right {
  opacity: 0;
  transform: translateX(40px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.fade-in-right.visible {
  opacity: 1;
  transform: translateX(0);
}

/* ============================
   Page Top Button
   ============================ */
.page-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  background: var(--primary);
  color: var(--white);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition);
  z-index: 100;
  border: none;
}

.page-top.visible {
  opacity: 1;
  pointer-events: auto;
}

.page-top:hover {
  background: var(--accent);
  transform: translateY(-3px);
}

/* ============================
   Responsive
   ============================ */
@media (max-width: 1024px) {
  .about-grid { grid-template-columns: 1fr; gap: 2rem; }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }

  .nav-links.active {
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: var(--white);
    justify-content: center;
    align-items: center;
    gap: 2rem;
    z-index: 999;
  }

  .nav-links.active a {
    font-size: 1.1rem;
  }

  .section { padding: 60px 1.5rem; }
  .section-title { font-size: 1.6rem; }

  .about-info-grid { grid-template-columns: 1fr; }

  .footer-top { flex-direction: column; gap: 2rem; }

  .cta-phone { font-size: 1.1rem; padding: 16px 30px; }
}
</style>
</head>
<body>
